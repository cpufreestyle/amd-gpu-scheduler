{{- if and .Values.allInOne.enabled (eq .Values.mode "allInOne") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hybrid-gpu-scheduler.fullname" . }}-allinone
  labels:
    {{- include "hybrid-gpu-scheduler.labels" . | nindent 4 }}
    component: allinone
spec:
  replicas: {{ .Values.allInOne.replicaCount }}
  selector:
    matchLabels:
      {{- include "hybrid-gpu-scheduler.selectorLabels" . | nindent 6 }}
      component: allinone
  template:
    metadata:
      labels:
        {{- include "hybrid-gpu-scheduler.selectorLabels" . | nindent 8 }}
        component: allinone
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "hybrid-gpu-scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: scheduler
          image: "{{ .Values.image.repository }}:{{ include "hybrid-gpu-scheduler.tag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --mode=allinone
            - --port=8080
            - --policy={{ .Values.allInOne.config.policy }}
            - --default-timeout={{ .Values.allInOne.config.defaultTimeout }}
            - --max-tasks-per-gpu={{ .Values.allInOne.config.maxTasksPerGPU }}
            {{- if .Values.allInOne.config.logDir }}
            - --log-dir={{ .Values.allInOne.config.logDir }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/scheduler/status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/scheduler/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.allInOne.resources | nindent 12 }}
          env:
            {{- if .Values.allInOne.nvidia.enabled }}
            - name: CUDA_VISIBLE_DEVICES
              value: {{ .Values.allInOne.nvidia.deviceIds | default "" | quote }}
            {{- end }}
            {{- if .Values.allInOne.amd.enabled }}
            - name: ROCR_VISIBLE_DEVICES
              value: {{ .Values.allInOne.amd.deviceIds | default "" | quote }}
            {{- end }}
            {{- if .Values.allInOne.nvidia.enabled }}
            - name: NVIDIA_MIG_CONFIG
              value: {{ .Values.allInOne.nvidia.migStrategy | quote }}
            {{- end }}
            - name: GOLANG_ENV
              value: "production"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            {{- if .Values.allInOne.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.allInOne.persistence.mountPath }}
            {{- end }}
            {{- if .Values.allInOne.nvidia.enabled }}
            - name: nvidia-lib
              mountPath: /usr/local/nvidia
            {{- end }}
            {{- if .Values.allInOne.amd.enabled }}
            - name: amd-lib
              mountPath: /opt/rocm
            {{- end }}
      volumes:
        {{- if .Values.allInOne.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hybrid-gpu-scheduler.fullname" . }}-data
        {{- end }}
        {{- if .Values.allInOne.nvidia.enabled }}
        - name: nvidia-lib
          hostPath:
            path: /usr/local/nvidia
        {{- end }}
        {{- if .Values.allInOne.amd.enabled }}
        - name: amd-lib
          hostPath:
            path: /opt/rocm
        {{- end }}
      {{- if or .Values.allInOne.nvidia.enabled .Values.allInOne.amd.enabled }}
      {{- include "hybrid-gpu-scheduler.gpuTolerations" . | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
