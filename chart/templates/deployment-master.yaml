{{- if and .Values.master.enabled (eq .Values.mode "master") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hybrid-gpu-scheduler.fullname" . }}-master
  labels:
    {{- include "hybrid-gpu-scheduler.labels" . | nindent 4 }}
    component: master
spec:
  replicas: {{ .Values.master.replicaCount }}
  selector:
    matchLabels:
      {{- include "hybrid-gpu-scheduler.selectorLabels" . | nindent 6 }}
      component: master
  template:
    metadata:
      labels:
        {{- include "hybrid-gaxe-scheduler.selectorLabels" . | nindent 8 }}
        component: master
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "hybrid-gpu-scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: master
          image: "{{ .Values.image.repository }}:{{ include "hybrid-gpu-scheduler.tag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --mode=master
            - --port=8080
            - --max-agents={{ .Values.master.config.maxAgents }}
            - --agent-timeout={{ .Values.master.config.agentTimeout }}
            - --policy={{ .Values.master.config.policy }}
            - --default-timeout={{ .Values.master.config.defaultTimeout }}
            - --max-tasks-per-gpu={{ .Values.master.config.maxTasksPerGPU }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/scheduler/status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/scheduler/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.master.resources | nindent 12 }}
          env:
            - name: GOLANG_ENV
              value: "production"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
