name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.22', '1.23' ]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: go test ./... -count=1 -race -v

    - name: Run benchmarks
      run: go test ./internal/scheduler/ -bench=. -benchmem -benchtime=2s

    - name: Build check (Linux)
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./cmd/server/
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./cmd/agent/
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./cmd/master/

    - name: Build check (Windows)
      run: |
        GOOS=windows GOARCH=amd64 go build ./cmd/server/
        GOOS=windows GOARCH=amd64 go build ./cmd/agent/
        GOOS=windows GOARCH=amd64 go build ./cmd/master/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=3m
