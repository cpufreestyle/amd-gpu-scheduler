name: Build Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag (e.g. v1.1.0)'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=all-in-one,enable=true
            type=raw,value=master,enable=true
            type=raw,value=agent,enable=true

      - name: Build and push all-in-one
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: all-in-one
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:all-in-one
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Build and push master
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: master
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:master
            ghcr.io/${{ github.repository }}:master-${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: agent
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:agent
            ghcr.io/${{ github.repository }}:agent-${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Summary
        run: |
          echo "## Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| all-in-one | \`ghcr.io/${{ github.repository }}:${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| master | \`ghcr.io/${{ github.repository }}:master-${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| agent | \`ghcr.io/${{ github.repository }}:agent-${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
