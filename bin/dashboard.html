<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid GPU Scheduler Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a1c2e 0%, #2a1a3e 100%); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a4a; }
  header h1 { font-size: 22px; background: linear-gradient(90deg, #00d4ff, #7b61ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 30px; }
  .card { background: #1a1c2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 24px; }
  .card:hover { border-color: #7b61ff; }
  .card h3 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .big-number { font-size: 42px; font-weight: 700; color: #00d4ff; }
  .gpu-card { background: #1a1c2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
  .gpu-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .gpu-nvidia::before { background: linear-gradient(90deg, #76b900, #a3d900); }
  .gpu-amd::before { background: linear-gradient(90deg, #ed1c24, #ff6b35); }
  .gpu-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .gpu-type { font-size: 12px; margin-bottom: 16px; }
  .gpu-type.nvidia { color: #76b900; }
  .gpu-type.amd { color: #ed1c24; }
  .vram-bar { background: #2a2a4a; border-radius: 6px; height: 12px; margin: 12px 0; overflow: hidden; }
  .vram-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }
  .vram-bar-fill.nvidia { background: linear-gradient(90deg, #76b900, #a3d900); }
  .vram-bar-fill.amd { background: linear-gradient(90deg, #ed1c24, #ff6b35); }
  .gpu-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
  .gpu-stat-label { color: #888; }
  .gpu-stat-value { color: #e0e0e0; font-weight: 600; }
  .task-table { width: 100%; border-collapse: collapse; }
  .task-table th { text-align: left; padding: 12px 16px; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2a4a; }
  .task-table td { padding: 12px 16px; border-bottom: 1px solid #1a1c2e; font-size: 14px; vertical-align: middle; }
  .task-table tr:hover { background: #1e2035; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-pending { background: #2a2a00; color: #ffd700; }
  .badge-running { background: #002a00; color: #00ff88; }
  .badge-completed { background: #002a2a; color: #00d4ff; }
  .badge-failed { background: #2a0000; color: #ff4444; }
  .badge-timeout { background: #2a1a00; color: #ff8800; }
  .badge-killed { background: #1a1a2a; color: #888; }
  .badge-training { background: #1a002a; color: #a855f7; }
  .badge-inference { background: #002a1a; color: #22d3ee; }
  .badge-compute { background: #2a2a00; color: #eab308; }
  .btn-sm { padding: 4px 10px; border-radius: 6px; border: 1px solid #2a2a4a; background: transparent; color: #888; cursor: pointer; font-size: 12px; margin-right: 4px; }
  .btn-sm:hover { border-color: #ff4444; color: #ff4444; }
  .btn-sm.stop { border-color: #ff8800; color: #ff8800; }
  .btn-sm.stop:hover { background: #ff8800; color: #fff; }
  .btn-sm.del { border-color: #ff4444; color: #ff4444; }
  .btn-sm.del:hover { background: #ff4444; color: #fff; }
  .policy-selector { display: flex; gap: 10px; margin-top: 16px; }
  .policy-btn { flex: 1; padding: 10px; border: 1px solid #2a2a4a; border-radius: 8px; background: transparent; color: #888; cursor: pointer; font-size: 13px; transition: all 0.3s; }
  .policy-btn:hover { border-color: #7b61ff; color: #e0e0e0; }
  .policy-btn.active { border-color: #7b61ff; background: #2a1a3e; color: #fff; }
  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .chart-container { background: #1a1c2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 24px; margin-bottom: 30px; }
  .refresh-btn { background: #7b61ff; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: #6a50ee; }
  .header-right { display: flex; align-items: center; gap: 20px; font-size: 14px; color: #888; }
  .error { color: #ff4444; }
  .log-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
  .log-modal.show { display: flex; }
  .log-content { background: #1a1c2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 24px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .log-content pre { background: #0f1117; padding: 16px; border-radius: 8px; font-size: 13px; overflow-x: auto; white-space: pre-wrap; }
</style>
</head>
<body>

<header>
  <h1>Hybrid GPU Scheduler</h1>
  <div class="header-right">
    <span><span class="status-dot"></span>v2.0 Hybrid</span>
    <button class="refresh-btn" onclick="refreshAll()">Refresh Now</button>
  </div>
</header>

<div class="container">
  <!-- Stats Row -->
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="card">
      <h3>Total GPUs</h3>
      <div class="big-number" id="stat-gpus">-</div>
    </div>
    <div class="card">
      <h3>Running Tasks</h3>
      <div class="big-number" id="stat-running">-</div>
    </div>
    <div class="card">
      <h3>Pending Tasks</h3>
      <div class="big-number" id="stat-pending">-</div>
    </div>
    <div class="card">
      <h3>Scheduling Policy</h3>
      <div style="font-size:18px;color:#7b61ff;margin-top:8px;" id="stat-policy">-</div>
    </div>
  </div>

  <!-- GPU Utilization Chart -->
  <div class="section-title">GPU Utilization (Live)</div>
  <div class="chart-container">
    <canvas id="util-chart" style="width:100%;height:200px;"></canvas>
  </div>

  <!-- GPU Cards -->
  <div class="section-title">GPU Resources</div>
  <div class="grid" id="gpu-grid">
    <div class="loading">Loading GPUs...</div>
  </div>

  <!-- Tasks -->
  <div class="section-title" style="margin-top:10px;">Tasks</div>
  <div class="card">
    <table class="task-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Type</th>
          <th>Priority</th>
          <th>Status</th>
          <th>VRAM (MB)</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="task-tbody">
        <tr><td colspan="7" class="loading" style="padding:20px;">Loading tasks...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Policy -->
  <div class="section-title" style="margin-top:10px;">Scheduling Policy</div>
  <div class="card">
    <p style="color:#888;font-size:14px;margin-bottom:12px;" id="policy-desc">Loading...</p>
    <div class="policy-selector">
      <button class="policy-btn" onclick="setPolicy('binpack')" id="btn-binpack">Binpack</button>
      <button class="policy-btn" onclick="setPolicy('spread')" id="btn-spread">Spread</button>
      <button class="policy-btn" onclick="setPolicy('gpu_type')" id="btn-gpu-type">GPU Type</button>
    </div>
  </div>
</div>

<!-- Log Modal -->
<div class="log-modal" id="log-modal">
  <div class="log-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 id="log-title">Task Log</h3>
      <button class="btn-sm" onclick="closeLog()" style="color:#888;">✕ Close</button>
    </div>
    <pre id="log-body">Loading...</pre>
  </div>
</div>

<script>
let refreshTimer;
let utilChart;

// History for charts
const utilHistory = { labels: [], nvidia: [], amd: [] };
const MAX_HISTORY = 60;

async function api(path) {
  const r = await fetch(path);
  const j = await r.json();
  if (!j.success && j.error) throw new Error(j.error);
  return j;
}

async function refreshAll() {
  try {
    const [gpus, tasks, status, policy] = await Promise.all([
      api('/api/gpus'),
      api('/api/tasks'),
      api('/api/scheduler/status'),
      api('/api/scheduler/policy'),
    ]);
    renderStats(status);
    renderGPUs(gpus.gpus);
    renderTasks(tasks.tasks);
    renderPolicy(policy);
    updateChart(gpus.gpus);
  } catch(e) {
    console.error(e);
  }
}

function renderStats(s) {
  document.getElementById('stat-gpus').textContent = s.total_gpus ?? '-';
  document.getElementById('stat-running').textContent = s.running_tasks ?? '-';
  document.getElementById('stat-pending').textContent = s.pending_tasks ?? '-';
  document.getElementById('stat-policy').textContent = s.policy ?? '-';
}

function renderGPUs(gpus) {
  const grid = document.getElementById('gpu-grid');
  grid.innerHTML = '';
  gpus.forEach(g => {
    const isNvidia = g.Info.Type === 'nvidia';
    const vramPct = ((g.Usage.UsedVRAMMB || 0) / g.Info.VRAMMB * 100).toFixed(1);
    const card = document.createElement('div');
    card.className = 'gpu-card ' + (isNvidia ? 'gpu-nvidia' : 'gpu-amd');
    card.innerHTML = `
      <div class="gpu-name">${g.Info.Name}</div>
      <div class="gpu-type ${isNvidia ? 'nvidia' : 'amd'}">${g.Info.Type.toUpperCase()} | ${g.Info.VRAMMB} MB VRAM</div>
      <div class="vram-bar"><div class="vram-bar-fill ${isNvidia ? 'nvidia' : 'amd'}" style="width:${vramPct}%"></div></div>
      <div style="font-size:12px;color:#888;margin-bottom:12px;">VRAM: ${g.Usage.UsedVRAMMB || 0} / ${g.Info.VRAMMB} MB (${vramPct}%)</div>
      <div class="gpu-stats">
        <span class="gpu-stat-label">Running Tasks</span><span class="gpu-stat-value">${g.Usage.RunningTasks || 0}</span>
        <span class="gpu-stat-label">Utilization</span><span class="gpu-stat-value">${g.Usage.Utilization || 0}%</span>
        <span class="gpu-stat-label">Temperature</span><span class="gpu-stat-value">${g.Usage.TemperatureC || '-'}°C</span>
        <span class="gpu-stat-label">Power Draw</span><span class="gpu-stat-value">${g.Usage.PowerDrawW || '-'}W</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderTasks(tasks) {
  const tbody = document.getElementById('task-tbody');
  if (!tasks || tasks.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="padding:20px;color:#666;">No tasks yet</td></tr>';
    return;
  }
  tbody.innerHTML = '';
  tasks.forEach(t => {
    const tr = document.createElement('tr');
    const statusClass = (t.Status || '').toLowerCase();
    const typeClass = (t.Type || '').toLowerCase();
    tr.innerHTML = `
      <td style="color:#00d4ff;">${t.ID}</td>
      <td>${t.Name || '-'}</td>
      <td><span class="badge badge-${typeClass}">${t.Type || '-'}</span></td>
      <td>${t.Priority || '-'}</td>
      <td><span class="badge badge-${statusClass}">${t.Status || '-'}</span></td>
      <td>${t.VRAMMB || '-'}</td>
      <td>
        ${t.Status === 'running' ? `<button class="btn-sm stop" onclick="stopTask('${t.ID}')">Stop</button>` : ''}
        <button class="btn-sm del" onclick="deleteTask('${t.ID}')">Delete</button>
        ${t.LogFile ? `<button class="btn-sm" onclick="viewLog('${t.ID}')">Log</button>` : ''}
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderPolicy(p) {
  document.getElementById('stat-policy').textContent = p.policy || '-';
  document.getElementById('policy-desc').textContent = p.description || '';
  ['binpack','spread','gpu_type'].forEach(k => {
    document.getElementById('btn-' + k).classList.toggle('active', k === (p.policy || ''));
  });
}

function updateChart(gpus) {
  const now = new Date().toLocaleTimeString();
  utilHistory.labels.push(now);
  let nvidiaUtil = 0, amdUtil = 0;
  gpus.forEach(g => {
    if (g.Info.Type === 'nvidia') nvidiaUtil = g.Usage.Utilization || 0;
    if (g.Info.Type === 'amd') amdUtil = g.Usage.Utilization || 0;
  });
  utilHistory.nvidia.push(nvidiaUtil);
  utilHistory.amd.push(amdUtil);
  if (utilHistory.labels.length > MAX_HISTORY) {
    utilHistory.labels.shift();
    utilHistory.nvidia.shift();
    utilHistory.amd.shift();
  }
  if (!utilChart) {
    const ctx = document.getElementById('util-chart').getContext('2d');
    utilChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: utilHistory.labels,
        datasets: [
          { label: 'NVIDIA %', data: utilHistory.nvidia, borderColor: '#76b900', backgroundColor: 'rgba(118,185,0,0.1)', tension: 0.4 },
          { label: 'AMD %', data: utilHistory.amd, borderColor: '#ed1c24', backgroundColor: 'rgba(237,28,36,0.1)', tension: 0.4 },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 300 },
        scales: {
          y: { min: 0, max: 100, ticks: { color: '#888' }, grid: { color: '#2a2a4a' } },
          x: { ticks: { color: '#888', maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { color: '#2a2a4a' } }
        },
        plugins: { legend: { labels: { color: '#888' } } }
      }
    });
  } else {
    utilChart.data.labels = utilHistory.labels;
    utilChart.data.datasets[0].data = utilHistory.nvidia;
    utilChart.data.datasets[1].data = utilHistory.amd;
    utilChart.update('none');
  }
}

async function stopTask(taskID) {
  if (!confirm('Stop task ' + taskID + '?')) return;
  try {
    const r = await fetch('/api/tasks/' + taskID + '/stop', { method: 'POST' });
    const j = await r.json();
    if (j.success) { alert('Task ' + taskID + ' stopped.'); refreshAll(); }
    else alert('Error: ' + (j.error || 'unknown'));
  } catch(e) { alert('Error: ' + e.message); }
}

async function deleteTask(taskID) {
  if (!confirm('Delete task ' + taskID + '?')) return;
  try {
    const r = await fetch('/api/tasks/' + taskID, { method: 'DELETE' });
    const j = await r.json();
    if (j.success) { alert('Task ' + taskID + ' deleted.'); refreshAll(); }
    else alert('Error: ' + (j.error || 'unknown'));
  } catch(e) { alert('Error: ' + e.message); }
}

async function viewLog(taskID) {
  try {
    const r = await fetch('/api/tasks/' + taskID);
    const j = await r.json();
    const logPath = j.task && j.task.LogFile;
    document.getElementById('log-title').textContent = 'Log: ' + taskID;
    document.getElementById('log-body').textContent = 'Log file: ' + (logPath || 'N/A');
    if (logPath) {
      // Try to fetch log via API - for now just show path
      document.getElementById('log-body').textContent = 'Log file on server:\n' + logPath + '\n\n(Log streaming not yet implemented)';
    }
    document.getElementById('log-modal').classList.add('show');
  } catch(e) {
    alert('Error loading log: ' + e.message);
  }
}
function closeLog() { document.getElementById('log-modal').classList.remove('show'); }

async function setPolicy(policy) {
  try {
    await fetch('/api/scheduler/policy', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({policy})
    });
    refreshAll();
  } catch(e) { console.error(e); }
}

// Init
refreshAll();
refreshTimer = setInterval(refreshAll, 5000);
</script>
</body>
</html>
